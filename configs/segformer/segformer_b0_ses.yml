batch_size: 4
iters: 20000

train_dataset:
  type: Dataset
  dataset_root: /home/vina01/data/SRS+100+cropped
  train_path: /home/vina01/data/SRS+100+cropped/train.txt
  num_classes: 2
  mode: train
  transforms:
    - type: ResizeStepScaling
      min_scale_factor: 0.5
      max_scale_factor: 2.0
      scale_step_size: 0.25
    - type: RandomPaddingCrop
      crop_size: [512, 512]
    - type: RandomHorizontalFlip
    - type: RandomDistort
      brightness_range: 0.4
      contrast_range: 0.4
      saturation_range: 0.4
    - type: Normalize

val_dataset:
  type: Dataset
  dataset_root: /home/vina01/data/SRS+100+cropped
  val_path: /home/vina01/data/SRS+100+cropped/val.txt
  num_classes: 2
  mode: val
  transforms:
    - type: Normalize

model:
  type: SegFormer
  backbone:
    type: MixVisionTransformer_B0
    pretrained: https://bj.bcebos.com/paddleseg/dygraph/backbone/mix_vision_transformer_b0.tar.gz
  embedding_dim: 256
  num_classes: 2

optimizer:
  type: AdamW
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.01

lr_scheduler:
  type: PolynomialDecay
  learning_rate: 0.00006
  end_lr: 0
  power: 1.0

loss:
  types:
    - type: CrossEntropyLoss
  coef: [1]